{% extends "base.html" %}{% block content %}<h1>Sources</h1><table><thead><tr><th>Source</th><th>Language</th><th>Country</th><th>Feed</th><th>URL</th><th>Enabled</th></tr></thead><tbody>{% for feed in feeds %}<tr><td>{{ feed.source.name }}</td><td>{{ feed.language }}</td><td>{{ feed.source.country }}</td><td>{{ feed.title }}</td><td><a href="{{ feed.feed_url }}">{{ feed.feed_url }}</a></td><td>{{ "yes" if feed.is_enabled else "no" }}</td></tr>{% endfor %}</tbody></table>{% endblock %}
